<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pop-up de Inscrição CodingLab</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="subscribe-card" id="subscribeCard">
        <span class="close-btn" id="closeToast">×</span>
        
        <div class="card-body">
            <div class="logo-container">
                <div class="logo-background">
                    <svg viewBox="0 0 100 100" class="cl-logo-svg">
                        <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-weight="700" font-size="60" fill="white">CL</text>
                    </svg>
                </div>
            </div>
            
            <div class="card-text">
                <h3>CodingLab</h3>
                <p>Subscribe Our YouTube Channel</p>
                <button class="sub-btn">Subscribe</button>
            </div>
        </div>
    </div>

</body>
</html>
